<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG Character Sheet</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="overlay"></div>

  <div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">

      <div class="avatar-frame">
        <img id="avatar" src="" alt="avatar">
      </div>

      <div class="character-name" id="character-name">
        Загрузка...
      </div>

      <!-- HP -->
      <div class="bar-block">
        <div class="bar-label">
          HP <span id="hp-text">0/0</span>
        </div>

        <div class="bar hp-bar">
          <div class="fill hp-fill" id="hp-fill"></div>
        </div>
      </div>

      <!-- MP -->
      <div class="bar-block">
        <div class="bar-label">
          MP <span id="mp-text">0/0</span>
        </div>

        <div class="bar mp-bar">
          <div class="fill mp-fill" id="mp-fill"></div>
        </div>
      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

      <div class="tabs">
        <button class="tab active" data-range="Inventory!A1:D20">
          Инвентарь
        </button>

        <button class="tab" data-range="Skills!A1:D20">
          Навыки
        </button>

        <button class="tab" data-range="Spells!A1:D20">
          Заклинания
        </button>
      </div>

      <div class="table-container">
        <table id="data-table"></table>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
